<header class="app-header">
  <nav class="nav">
    <a routerLink="/home" class="brand">Ίκαρος Νέας Σμύρνης BC</a>
    <span class="spacer"></span>

    @if (auth.isLoggedIn()) {
      <div class="user-menu" tabindex="0">
        <span>Welcome {{ auth.userNameSig() || 'User' }}</span>
        <button type="button" (click)="logout()">Sign out</button>
      </div>
    } @else {
      <!-- IMPORTANT: routerLink, not href -->
      <a routerLink="/auth/login" class="secondary">Σύνδεση</a>
      <a routerLink="/auth/signup" class="primary">Εγγραφή</a>
    }
  </nav>
</header>
