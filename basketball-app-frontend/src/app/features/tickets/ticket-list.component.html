<h1>Tickets</h1>

<div class="grid" *ngIf="(fixtures$ | async) ?? [] as fixtures">
  <article class="card" *ngFor="let f of fixtures">
    <h3>{{ f.opponent }}</h3>
    <div class="meta">{{ f.date | date:'mediumDate' }}</div>

    <a *ngIf="auth.isLoggedIn(); if loginFirst"
       class="btn"
       [routerLink]="['/tickets/checkout', f.id]">Buy</a>

    <ng-template #loginFirst>
      <a class="btn outline"
         routerLink="/auth/login"
         [queryParams]="{ returnUrl: '/tickets' }">sign in to buy</a>
    </ng-template>
  </article>
</div>
