
<h1>Tickets</h1>
<!-- src/app/features/tickets/ticket-list.component.html -->
<h1>Tickets</h1>

<div class="grid">
  <article class="card" *ngFor="let f of (fixtures$ | async) ?? []">
    <h3>{{ f.opponent }}</h3>
    <div class="meta">{{ f.date | date:'mediumDate' }} • {{ f.venue }}</div>

    <a *ngIf="auth.isLoggedIn(); else loginFirst"
       class="btn"
       [routerLink]="['/tickets/checkout', f.id]">Buy</a>

    <ng-template #loginFirst>
      <a class="btn outline"
         routerLink="/auth/login"
         [queryParams]="{ returnUrl: '/tickets' }">sign in to buy</a>
    </ng-template>
  </article>
</div>
