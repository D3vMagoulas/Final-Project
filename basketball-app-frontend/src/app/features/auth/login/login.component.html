<section class="page page-bg" style="background-image: url('/assets/bg/signin-signup.png')">
  <div class="card">
    <h1>Sign in</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <div class="form-field">
        <label for="username">Username</label>
        <input id="username" formControlName="username" type="text" placeholder="Enter your username" />
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input id="password" formControlName="password" type="password" placeholder="Enter your password" />
      </div>

      <button type="submit" [disabled]="form.invalid || pending">Sign in</button>
    </form>

    <div class="footer-text">
      Don’t have an account?
      <a routerLink="/auth/signup" [queryParams]="{ returnUrl: returnUrl }">Create one</a>
    </div>
  </div>
</section>
