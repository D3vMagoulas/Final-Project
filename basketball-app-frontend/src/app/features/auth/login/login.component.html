<h2>Sign in</h2>

<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="field">
    <label for="username">Username</label>
    <input id="username" type="text" formControlName="username" autocomplete="username" />
    <small *ngIf="f.username.touched && f.username.invalid">Username is required.</small>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input id="password" type="password" formControlName="password" autocomplete="current-password" />
    <small *ngIf="f.password.touched && f.password.hasError('required')">Password is required.</small>
    <small *ngIf="f.password.touched && f.password.hasError('minlength')">Min 4 characters.</small>
  </div>

  <div class="error" *ngIf="error">{{ error }}</div>

  <button class="btn" type="submit" [disabled]="pending || form.invalid">
    {{ pending ? 'Signing in…' : 'Sign in' }}
  </button>
</form>

<p class="muted">
  New here?
  <a [routerLink]="['/auth/signup']" [queryParams]="{ returnUrl: returnUrl }">Create an account</a>
</p>

<p>
  Don’t have an account? 
  <a routerLink="/auth/signup">Sign up here</a>
</p>
