<section class="page page-bg" style="background-image: url('/assets/bg/signin-signup.png')">
  <div class="card">
    <h1>Create Account</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <div class="form-field">
        <label for="name">First Name</label>
        <input id="name" formControlName="name" type="text" placeholder="Enter your first name" />
      </div>

      <div class="form-field">
        <label for="surname">Last Name</label>
        <input id="surname" formControlName="surname" type="text" placeholder="Enter your last name" />
      </div>

      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" formControlName="email" type="email" placeholder="Enter your email" />
      </div>

      <div class="form-field">
        <label for="phone">Phone Number</label>
        <input id="phone" formControlName="phone" type="tel" placeholder="Enter your phone number" />
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input id="password" formControlName="password" type="password" placeholder="Enter your password" />
      </div>

      <button type="submit" [disabled]="form.invalid || pending">Sign up</button>
    </form>

    <div class="footer-text">
      Already have an account?
      <a routerLink="/auth/login" [queryParams]="{ returnUrl: returnUrl }">Sign in</a>
    </div>
  </div>
</section>
