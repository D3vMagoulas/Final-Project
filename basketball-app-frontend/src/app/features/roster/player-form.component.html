<form
  *ngIf="auth.isAdmin()"
  [formGroup]="form"
  (ngSubmit)="submit()"
  class="player-form"
>
  <label>
    Jersey Number
    <input type="number" formControlName="numberOnJersey" />
  </label>
  <label>
    First Name
    <input type="text" formControlName="firstName" />
  </label>
  <label>
    Last Name
    <input type="text" formControlName="lastName" />
  </label>
  <label>
    Position
    <input type="text" formControlName="position" />
  </label>
   <label>
    Height (cm)
    <input type="number" formControlName="heightCm" />
  </label>
  <label>
    Birth Date
    <input type="date" formControlName="birthDate" />
  </label>
  <label>
    Nationality
    <input type="text" formControlName="nationality" />
  </label>
  <label>
    Photo URL
    <input type="text" formControlName="photoUrl" />
  </label>
  <label>
    Active
    <input type="checkbox" formControlName="active" />
  </label>
  <div class="form-actions">
    <button class="action-btn" type="submit">
      {{ form.value.id ? 'Update' : 'Add' }} Player
    </button>
    <button class="action-btn" type="button" (click)="cancel.emit()">Cancel</button>
  </div>
</form>
