<section class="page page-bg" style="background-image: url('/assets/bg/roster.png')">
  <div class="page__content">
    <div *ngIf="auth.isAdmin()">
      <h2>Roster Management</h2>
      <button (click)="addNew()">Add Player</button>
      <table class="roster-table">
        <tr *ngFor="let p of (players$ | async)">
          <td>{{ p.numberOnJersey }}</td>
          <td>{{ p.fullName }}</td>
          <td>{{ p.birthDate | date }}</td>
          <td>{{ p.heightCm }} cm</td>
          <td>{{ p.nationality }}</td>
          <td>{{ p.position }}</td>
          <td>{{ p.position }}</td>
          <td>
            <button (click)="edit(p)">Edit</button>
            <button (click)="remove(p)">Delete</button>
          </td>
        </tr>
      </table>
      <app-player-form
        *ngIf="editing()"
        [player]="editing()"
        (saved)="saved()"
        (cancel)="cancel()"
      ></app-player-form>
    </div>
  </div>
</section>
